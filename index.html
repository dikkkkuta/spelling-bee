<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Bee Game</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7f7f7; }
        .container { width: 100%; max-width: 600px; margin: auto; padding: 20px; background: white; border-radius: 5px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        h1 { text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Spelling Bee Game</h1>
        <input type="text" id="wordInput" placeholder="Type a word..." />
        <button onclick="checkSpelling()">Check Spelling</button>
        <p id="result"></p>
    </div>
    <script>
        const words = ["apple", "banana", "grape", "orange", "kiwi"];
        function checkSpelling() {
            const input = document.getElementById('wordInput').value.toLowerCase();
            const result = document.getElementById('result');
            if (words.includes(input)) {
                result.textContent = 'Correct!';
                result.style.color = 'green';
            } else {
                result.textContent = 'Incorrect, try again!';
                result.style.color = 'red';
            }
        }
    </script>
</body>
</html>
